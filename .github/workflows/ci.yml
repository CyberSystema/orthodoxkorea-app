name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    name: Build iOS
    runs-on: macos-15
    env:
      SKIP_ZERO: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Skip
        run: brew install skiptools/skip/skip

      - name: Verify Skip
        run: skip checkup

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -workspace Project.xcworkspace -scheme "OrthodoxKorea App"

      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -workspace Project.xcworkspace \
            -scheme "OrthodoxKorea App" \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -skipPackagePluginValidation \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
